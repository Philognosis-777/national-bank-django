{% extends 'core/base.html' %}
{% block content %}
<main class="container my-5">
	<a href="{% url 'news:papernews-list' %}" class="btn btn-link mb-3">← Back to articles</a>
	<article class="card">
		<div class="card-body">
			<h1 class="card-title">{{ article.title }}</h1>
			<p class="text-muted">{{ article.published_at|date:'F j, Y' }}</p>
			{% if article.cover_image %}
			<img src="{{ article.cover_image.url }}" class="img-fluid mb-3" alt="{{ article.title }}">
			{% endif %}
			<div class="content">{{ article.content|safe }}</div>
		</div>
	</article>
</main>
{% endblock %}
