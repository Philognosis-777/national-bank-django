{% extends 'core/base.html' %}
{% block content %}
<main class="container my-5">
	<div class="d-flex justify-content-between align-items-center mb-3">
		<h1 class="h3">Paper News</h1>
		<a class="btn btn-sm btn-primary" href="{% url 'news:papernews-create' %}">New Article</a>
	</div>

	<div class="row">
		{% for article in articles %}
		<div class="col-md-4 mb-3">
			<div class="card h-100">
				{% if article.cover_image %}
				<img src="{{ article.cover_image.url }}" class="card-img-top" alt="{{ article.title }}">
				{% endif %}
				<div class="card-body d-flex flex-column">
					<h5 class="card-title">{{ article.title }}</h5>
					<p class="card-text text-muted mb-2">{{ article.published_at|date:'M d, Y' }}</p>
					<p class="card-text">{{ article.excerpt }}</p>
					<div class="mt-auto">
						<a href="{% url 'news:papernews-detail' article.pk %}" class="btn btn-sm btn-outline-primary">Read</a>
					</div>
				</div>
			</div>
		</div>
		{% empty %}
		<div class="col-12">No articles yet.</div>
		{% endfor %}
	</div>
</main>
{% endblock %}
