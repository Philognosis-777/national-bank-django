{% extends 'core/base.html' %}
{% block content %}
<main class="container my-5">
	<div class="d-flex justify-content-between align-items-center mb-3">
		<h1 class="h3">Video News</h1>
		<a class="btn btn-sm btn-primary" href="{% url 'news:videonews-create' %}">Upload Video</a>
	</div>

	<div class="row">
		{% for v in videos %}
		<div class="col-md-4 mb-3">
			<div class="card h-100">
				{% if v.thumbnail %}
				<img src="{{ v.thumbnail.url }}" class="card-img-top" alt="{{ v.title }}">
				{% endif %}
				<div class="card-body d-flex flex-column">
					<h5 class="card-title">{{ v.title }}</h5>
					<p class="card-text text-muted mb-2">{{ v.published_at|date:'M d, Y' }}</p>
					<p class="card-text">{{ v.excerpt }}</p>
					<div class="mt-auto">
						<a href="{% url 'news:videonews-detail' v.pk %}" class="btn btn-sm btn-outline-primary">Watch</a>
					</div>
				</div>
			</div>
		</div>
		{% empty %}
		<div class="col-12">No videos yet.</div>
		{% endfor %}
	</div>
</main>
{% endblock %}
