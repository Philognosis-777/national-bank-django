{% extends 'core/base.html' %}
{% block content %}
<main class="container my-5">
	<a href="{% url 'news:verbalannouncement-list' %}" class="btn btn-link mb-3">← Back to announcements</a>
	<div class="card">
		<div class="card-body">
			<h2 class="card-title">{{ announcement.title }}</h2>
			<p class="text-muted">{{ announcement.published_at|date:'F j, Y' }}</p>
			<div class="content">{{ announcement.content|safe }}</div>
		</div>
	</div>
</main>
{% endblock %}
