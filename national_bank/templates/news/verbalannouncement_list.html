{% extends 'core/base.html' %}
{% block content %}
<main class="container my-5">
	<div class="d-flex justify-content-between align-items-center mb-3">
		<h1 class="h3">Verbal Announcements</h1>
		<a class="btn btn-sm btn-primary" href="{% url 'news:verbalannouncement-create' %}">New Announcement</a>
	</div>

	<div class="list-group">
		{% for ann in announcements %}
			<a href="{% url 'news:verbalannouncement-detail' ann.pk %}" class="list-group-item list-group-item-action">
				<div class="d-flex w-100 justify-content-between">
					<h5 class="mb-1">{{ ann.title }}</h5>
					<small class="text-muted">{{ ann.published_at|date:'M d, Y' }}</small>
				</div>
				<p class="mb-1">{{ ann.excerpt }}</p>
			</a>
		{% empty %}
			<div class="list-group-item">No announcements published.</div>
		{% endfor %}
	</div>
</main>
{% endblock %}
