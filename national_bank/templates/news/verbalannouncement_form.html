{% extends 'core/base.html' %}
{% block content %}
<main class="container my-5">
	<div class="row justify-content-center">
		<div class="col-md-8">
			<div class="card">
				<div class="card-body">
					<h3 class="card-title mb-3">{{ form_title|default:'New Announcement' }}</h3>
					<form method="post">
						{% csrf_token %}
						{{ form.as_p }}
						<div class="mt-3 d-flex justify-content-between">
							<button class="btn btn-success" type="submit">Publish</button>
							<a href="{% url 'news:verbalannouncement-list' %}" class="btn btn-link">Cancel</a>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</main>
{% endblock %}
