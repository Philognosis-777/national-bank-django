<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 (replaces Bootstrap Icons) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Ethiopic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --primary-dark: #3730a3;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 4px 10px -6px rgba(0, 0, 0, 0.05);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ═══════════ Navbar ═══════════ */
        .navbar {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .navbar-brand {
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            color: #f8fafc !important;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        .navbar-brand i {
            color: var(--primary-light);
            font-size: 1.4rem;
            filter: drop-shadow(0 0 6px rgba(129, 140, 248, 0.5));
        }

        .navbar-brand:hover i {
            color: #a5b4fc;
        }

        .navbar .nav-link {
            color: #cbd5e1 !important;
            font-weight: 500;
            font-size: 0.9rem;
            border-radius: 8px;
            padding: 0.5rem 1rem !important;
            transition: var(--transition);
            letter-spacing: -0.01em;
        }

        .navbar .nav-link:hover {
            color: #f1f5f9 !important;
            background: rgba(255, 255, 255, 0.06);
        }

        .navbar .nav-link i {
            font-size: 0.85rem;
            margin-right: 0.35rem;
            opacity: 0.8;
        }

        .navbar-toggler {
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 0.4rem 0.65rem;
        }

        .navbar-toggler:focus {
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.3);
            outline: none;
        }

        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(248, 250, 252, 0.8)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }

        /* ═══════════ Main Content ═══════════ */
        main {
            flex: 1;
        }

        /* ═══════════ Footer ═══════════ */
        footer {
            background: #ffffff;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 1.25rem 0;
            margin-top: auto;
        }

        /* ═══════════ Welcome Card (default page) ═══════════ */
        .welcome-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
        }

        .welcome-card:hover {
            box-shadow: 0 20px 40px -8px rgba(0, 0, 0, 0.1);
        }

        .welcome-icon {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
            opacity: 0.9;
        }

        /* ═══════════ Responsive ═══════════ */
        @media (max-width: 768px) {
            .navbar-brand {
                font-size: 1.1rem;
            }
            .welcome-icon {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Main Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fa-solid fa-shield-halved"></i> Admin Portal
            </a>

            <!-- Mobile Toggle Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

    </div>
</nav>

<!-- Main Content Area -->
<main>
    {% block content %}
    <!-- Default Welcome Page (overwritten by child templates) -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="welcome-card p-5 text-center">
                    <div class="welcome-icon">
                        <i class="fa-solid fa-gauge-high"></i>
                    </div>
                    <h1 class="display-6 fw-bold text-dark">Welcome to the Admin Dashboard</h1>
                    <p class="fs-5 text-secondary mt-3 mb-0">
                        Centralized management for your news feeds, financial institutions, and market data analytics.
                    </p>
                    <hr class="my-4" style="opacity: 0.3;">
                    <div class="row g-3 justify-content-center">
                        <div class="col-auto">
                            <a href="{% url 'dashboard:news-dashboard' %}" class="btn btn-outline-primary rounded-pill px-4">
                                <i class="fa-solid fa-newspaper me-2"></i> Manage News
                            </a>
                        </div>
                        <div class="col-auto">
                            <a href="{% url 'dashboard:institution-dashboard' %}" class="btn btn-outline-primary rounded-pill px-4">
                                <i class="fa-solid fa-building-columns me-2"></i> Institutions
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endblock %}
</main>

<!-- Simple Footer -->
<footer>
    <div class="container text-center">
        &copy; 2024 Admin Portal. All rights reserved.
    </div>
</footer>

<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
