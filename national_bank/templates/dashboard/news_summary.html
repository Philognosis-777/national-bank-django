<div class="card mb-3 dashboard-widget dashboard-news-summary">
	<div class="card-body">
		<div class="d-flex align-items-start">
			<div class="me-3">
				<i class="fas fa-newspaper fa-2x text-primary"></i>
			</div>
			<div class="flex-fill">
				<h5 class="card-title mb-1">News Summary</h5>
				{% if news.title %}
					<p class="card-text mb-1"><a href="{% url 'news:papernews-detail' news.pk %}">{{ news.title }}</a></p>
				{% elif news %}
					<p class="card-text mb-1">Latest headline: <strong>{{ news }}</strong></p>
				{% else %}
					<p class="card-text mb-1 text-muted">No recent news available.</p>
				{% endif %}

				{% if news.published_at %}
					<small class="text-muted">Published: {{ news.published_at|date:"M j, Y H:i" }}</small>
				{% endif %}
			</div>
		</div>
	</div>
</div>
