{% extends 'core/base.html' %}
{% block content %}
<main class="container my-5">
	<a href="{% url 'market:indicator-list' %}" class="btn btn-link mb-3">← Back to indicators</a>
	<div class="card">
		<div class="card-body">
			<h2 class="card-title">{{ indicator.name }}</h2>
			<p class="text-muted">Reference period: {{ indicator.reference_period }}</p>
			<p class="lead">Value: <strong>{{ indicator.value }}</strong> {{ indicator.unit }}</p>

			<div class="mt-3">
				<a href="{% url 'market:indicator-update' indicator.id %}" class="btn btn-sm btn-outline-primary">Edit</a>
				<form method="post" action="{% url 'market:indicator-delete' indicator.id %}" class="d-inline">
					{% csrf_token %}
					<button class="btn btn-sm btn-danger" type="submit">Delete</button>
				</form>
			</div>
		</div>
	</div>
</main>
{% endblock %}
