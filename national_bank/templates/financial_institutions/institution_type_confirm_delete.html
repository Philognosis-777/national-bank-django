<html>


{% block title %}Confirm Delete - National Bank{% endblock %}

{% block content %}
<div class="container py-4">
	<h1>Confirm Delete Institution Type</h1>
	<p>Are you sure you want to delete the institution type "{{ institution_type.name }}"?</p>
	<form method="post">
		{% csrf_token %}
		<button type="submit" class="btn btn-danger">Yes, Delete</button>
		<a href="{% url 'financial_institutions:institution-type-detail' institution_type.pk %}" class="btn btn-secondary">Cancel</a>
	</form>
</div>
</html>
