{% extends 'core/base.html' %}
{% block content %}
<main class="container my-5">
	<div class="d-flex justify-content-between align-items-center mb-3">
		<h1 class="h3">Branches</h1>
		<a class="btn btn-sm btn-primary" href="{% url 'financial_institutions:branch-create' %}">Add Branch</a>
	</div>

	<div class="list-group">
		{% for branch in branches %}
			<div class="list-group-item">
				<div class="d-flex justify-content-between">
					<div>
						<strong>{{ branch.name }}</strong><br>
						<small class="text-muted">{{ branch.institution.name }} — {{ branch.address }}</small>
					</div>
					<div>
						<a href="{% url 'financial_institutions:branch-edit' branch.id %}" class="btn btn-sm btn-outline-secondary">Edit</a>
					</div>
				</div>
			</div>
		{% empty %}
			<div class="list-group-item">No branches found.</div>
		{% endfor %}
	</div>
</main>
{% endblock %}
